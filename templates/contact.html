<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact - SentimentAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#020617] text-white">

<!-- Navbar -->
<header class="py-6 px-12 flex justify-between items-center">
    <a href="/" class="text-xl font-bold">SentimentAI</a>
    <div class="space-x-8 text-gray-400">
        <a href="/" class="hover:text-white">Home</a>
        <a href="/about" class="hover:text-white">About</a>
        <a href="/contact" class="text-white">Contact</a>
    </div>
</header>

<!-- Hero -->
<section class="py-24 text-center">
    <h1 class="text-5xl font-bold mb-6">
        Contact <span class="text-indigo-400">Us</span>
    </h1>
    <p class="text-gray-400">
        Have questions? We'd love to hear from you.
    </p>
</section>

<!-- Contact Form -->
<section class="pb-24">
    <div class="max-w-2xl mx-auto bg-[#0f172a] p-10 rounded-2xl border border-gray-700">

        <form class="space-y-6">
            <div>
                <label class="block text-sm text-gray-400 mb-2">Full Name</label>
                <input type="text"
                       class="w-full p-3 rounded-lg bg-[#111827] border border-gray-700 focus:outline-none focus:border-indigo-500">
            </div>

            <div>
                <label class="block text-sm text-gray-400 mb-2">Email</label>
                <input type="email"
                       class="w-full p-3 rounded-lg bg-[#111827] border border-gray-700 focus:outline-none focus:border-indigo-500">
            </div>

            <div>
                <label class="block text-sm text-gray-400 mb-2">Message</label>
                <textarea rows="5"
                          class="w-full p-3 rounded-lg bg-[#111827] border border-gray-700 focus:outline-none focus:border-indigo-500"></textarea>
            </div>

            <button type="submit"
                    class="w-full py-3 bg-indigo-600 rounded-xl hover:bg-indigo-500 transition">
                Send Message
            </button>
        </form>

    </div>
</section>

<footer class="py-10 text-center text-gray-500 border-t border-gray-800">
    © 2026 SentimentAI. All rights reserved.
</footer>

</body>
</html>
